# Paid Blueprint (~$9/mo): starter web + 2 cron jobs.
# Free tier ($0): skip Blueprint — create one free web service manually (see DEPLOYMENT-AND-SECRETS.md)
# and use .github/workflows/orchestrator-cron.yml for scheduled runs.

services:
  - type: web
    name: aegisai-api
    runtime: docker
    plan: starter
    dockerContext: .
    dockerfilePath: services/api/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: LLM_PLANE_DEMO_FALLBACK
        value: true
      - key: SEMANTIC_CACHE_OPS_URL
        value: https://aegis-semantic-cache-api.onrender.com/v1/ops/metrics
      - key: LLM_GATEWAY_OPS_URL
        value: https://aegis-llm-gateway-api.onrender.com/v1/ops/metrics
      - key: LLM_GATEWAY_TENANT_ID
        value: aegisai
      - key: LLM_GATEWAY_API_KEY
        sync: false
      - key: LLM_GATEWAY_URL
        value: https://aegis-llm-gateway-api.onrender.com/v1
      - key: AEGISAI_LLM_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: AEGISAI_DB_BACKEND
        value: postgres
      - key: DATABASE_URL
        sync: false
      - key: AEGISAI_CORS_ORIGINS
        sync: false
      - key: SLACK_CONTENT_WEBHOOK_URL
        sync: false
      - key: SLACK_STOCK_WEBHOOK_URL
        sync: false
      - key: SLACK_APPROVAL_WEBHOOK_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO_OWNER
        sync: false
      - key: GITHUB_REPO_NAME
        sync: false
      - key: VERCEL_TOKEN
        sync: false
      - key: VERCEL_PROJECT_ID
        sync: false
      - key: RENDER_API_KEY
        sync: false
      - key: RENDER_SERVICE_ID
        sync: false
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false
      - key: LANGSMITH_API_KEY
        sync: false
      - key: AGENTFINOPS_API_URL
        value: https://agent-finops-api.onrender.com
      - key: AGENTFINOPS_API_KEY
        sync: false

  - type: cron
    name: aegisai-content-pipeline
    schedule: "0 7 * * 1,4"
    runtime: docker
    dockerContext: .
    dockerfilePath: services/api/Dockerfile
    dockerCommand: python3 -c "import httpx; httpx.post('https://aegisai-api.onrender.com/api/orchestrators/ai-content/run', headers={'X-AegisAI-Principal': 'render-cron'}, timeout=120)"

  - type: cron
    name: aegisai-stock-research
    schedule: "0 11 * * 1-5"
    runtime: docker
    dockerContext: .
    dockerfilePath: services/api/Dockerfile
    dockerCommand: python3 -c "import httpx; httpx.post('https://aegisai-api.onrender.com/api/orchestrators/stock-research/run', headers={'X-AegisAI-Principal': 'render-cron'}, timeout=120)"
